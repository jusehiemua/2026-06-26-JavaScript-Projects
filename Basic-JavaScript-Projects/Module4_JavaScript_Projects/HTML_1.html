<!DOCTYPE html>

<body>
    <h1>Canvas Challenge</h1>
    <canvas id="myCanvas" width="200" height="100" style="border:1px solid #d62222;">
        Your browser does not support the HTML canvas tag.</canvas>

    <!-- Canvas 1: Wide Horizontal Rectangle (400x150) -->
    <h2>Canvas 1 (Wide Rectangle)</h2>
    <p>Click inside this wide rectangle to see the action</p>
    <canvas id="rectCanvasW" width="400" height="150" style="border:3px solid black;" onclick="rectCanvasWide()"></canvas>

    <!-- Canvas 2: Tall Vertical Rectangle (200x350) -->
    <h2>Canvas 2 (Tall Rectangle)</h2>
      <p>Click inside this tall rectangle to see the effects of horizontal, vertical and diagonal gradients</p>
    <canvas id="rectCanvasT" width="200" height="600" style="border:3px solid rgb(9, 106, 33);" onclick="rectCanvasTall()"></canvas>

    <script src="JavaScript/JavaScript_1.js"></script>
    </script>
