    <main>

       

        <section id="contact">
            <h2>Contact Form Challenge</h2>
            <p>
                Complete the form below if you want more information about Sleek Motorbikes.
            </p>

            <form id="contactForm">
                <label for="fullName">Full Name:</label>
                <input type="text" id="fullName" name="fullName" placeholder="Enter your full name">

                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" placeholder="Enter your email address">

                <label for="telPhone">Telephone Number:</label>
                <input type="tel" id="telPhone" name="telPhone" placeholder="Enter your telephone number">

                <label for="mailingAddress">Mailing Address:</label>
                <input type="text" id="mailingAddress" name="mailingAddress" placeholder="Enter your mailing address.">

                <label for="message">Message:</label>
                <textarea id="message" name="message" placeholder="Type your message here"></textarea>

                <input type="submit" value="Submit"><input type="reset" value="Reset">
            </form>

            <p id="formMessage"></p>
        </section>

    </main>
