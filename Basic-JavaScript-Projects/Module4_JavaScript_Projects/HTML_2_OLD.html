<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form Challenge</title>
    <style>
        .label {
            font-size: large;
            font-weight: bold;
        }

        #form {
            width: 100%;
            max-width: 400px;
            /* Essential: sets the container boundary */
            margin: 0 auto;
            /* 0 top/bottom, auto left/right forces centering */
        }
    </style>
</head>

<body>
    <h1>Contact Form Challenge</h1>
    <p>Click (in any order) on each bulletpoint in the list below of universes to interact with a data attribute of each
        list element!</p>
    <div id="form">
        <form action="/action_page.php">
            <label for="fname" class="label">First name:</label>
            <input type="text" id="fname" name="fname" value="John"><br>
            <label for="lname" class="label">Last name:</label>
            <input type="text" id="lname" name="lname" value="Doe"><br><br>
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">
        </form>
    </div>
</body>

</html>
